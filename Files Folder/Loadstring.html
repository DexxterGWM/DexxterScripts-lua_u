<script>
function copyToClipboard(element) {var $temp = $('<input>'); $('body').append($temp); $temp.val($(element).text()).select(); document.execCommand('copy'); $temp.remove();}
</script>

<center>
<p style='color:#FFFFFF;' id='loadstring'>loadstring(Game:HttpGet('https://raw.githubusercontent.com/DexxterGWM/DexxterScripts-lua_u/loader/Files%20Folder/ScriptBuild.lua'))()</p>
<button onclick='copyToClipboard("#loadstring")'>Copy Script</button>
</center>
